  - visual
  stimulus_type: visual flash
  study_design: Three game sessions with different flash durations (110ms, 80ms, 50ms), with resting state and eyes closed
    conditions recorded before and after. Subjects were instructed to limit eye blinks, head movements and face muscular contractions.
file_format: mat and csv
methodology: The experiment consisted of three game sessions of Brain Invaders of 9 levels each with different flash duration
  (110ms, 80ms, 50ms). Before and after the three game sessions, around one minute of resting state and eyes closed conditions
  were recorded. The interface is composed of 36 aliens. A repetition is composed of 12 flashes of pseudo-random groups of
  six symbols chosen in such a way that after each repetition each symbol has flashed exactly two times. The ratio of Target
  versus non-Target is one-to-five. During the experiment, the output of a real-time adaptive Riemannian Minimum Distance
  to Mean (RMDM) classifier was used for assessing the participants' command. This scheme allows a calibration-free classifier.
